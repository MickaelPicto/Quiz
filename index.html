<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Money20</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #331505;
}
.container {
    width: 90%;
    border-radius: 12px;
    text-align: center;
}
.hidden {
    display: none;
}
button {
    padding: 20px 50px;
    margin: 10px;
    width: 70%;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff671b, #d22a2f 100%);
    color : #ffffff;
    cursor: pointer;
    font-size: 3rem;
}

#readyBtn{
	height: 150px;
	}
	
.answers button {
    display: block;
    width: 100%;
	height: 150px;
	margin-bottom: 50px;
}
	
.answer {
  transition: all 0.3s ease;
}

/* état bloqué */
body.locked .answer {
  pointer-events: none;
  opacity: 0.4;
}

/* bonne réponse */
.answer.correct {
background: linear-gradient(90deg, #8db92e, #8db92e);
	color: white;
  opacity: 1;
}

/* mauvaise réponse */
.answer.wrong {
background: linear-gradient(90deg, #d22a2f, #a82226);
	color: white;
  opacity: 1;
}

/* 👇 important */
body.locked .answer.correct,
body.locked .answer.wrong {
  opacity: 1;
}
	
#timer {
    margin-bottom: 20px;
}
.timer-circle {
    width: 240px;
    height: 240px;
    margin: 0 auto 20px;
    position: relative;
}
.timer-circle svg {
    transform: rotate(-90deg);
}
.timer-circle circle {
    fill: none;
    stroke-width: 8;
}
.timer-bg {
    stroke: #ff671b;
}
.timer-progress {
    stroke: #f1efeb;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.2s linear;
}
.timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: bold;
	font-size: 85px;
	color: #ffffff;
}
#result {
    font-size: 12rem;
    font-weight: bold;
    margin: 20px 0;
    color: #ff7632;
}
#resultPage {
    color: white;
}
#question {
    color: white;
	margin-bottom: 100px;
	font-size: 4rem;
}
#progress {
    font-size: 2.5rem;
    margin-bottom: 50px;
    color: #8c8c8c;
}
#thanksEnd {
    font-size: 6rem;
}
#endBtn {
    margin-top: 50px;
    width: 70%;
	height: 150px;
    border: none;
    border-radius: 8px;
    background : #141413;
    color : #54524f;
    cursor: pointer;
    font-size: 3rem;
}
#logo-bottom {
    padding-top: 60px;
}
#result-bottom-infos {
    border-top: 1px solid #ffffff;
    margin-top: 50px;
    padding-top: 25px;
}
#result-bottom-infos p {
    font-size: 4rem;
}	
	
</style>
</head>
<body>
<div class="container"> 
  
  <!-- INTRO -->
  <div id="intro"> 
    <!-- <h1>Bienvenue au Quiz</h1>
    <p>Testez vos connaissances !</p> --> 
    <img src="ready-title-v3.png" width="100%">
    <button id="readyBtn" onclick="startQuiz()">I'm ready</button>
  </div>
  
  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div id="progress"></div>
    <div class="timer-circle">
      <svg width="240" height="240">
        <circle class="timer-bg" cx="120" cy="120" r="100"></circle>
        <circle class="timer-progress" cx="120" cy="120" r="100" stroke-dasharray="628" stroke-dashoffset="628"></circle>
      </svg>
      <div class="timer-text" id="timer">20</div>
    </div>
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
    <div id="logo-bottom"> <img src="Mclaren-MA-logo.png" width="50%"> </div>
  </div>
  
  <!-- RESULT -->
  <div id="resultPage" class="hidden"> <img src="Mclaren-MA-logo.png" width="50%">
    <p id="thanksEnd">Thanks for taking the <b>Mastercard x McLaren Pole Position Challenge</b>.</p>
    <div id="result"> </div>
    <div id="result-bottom-infos">
      <p>Ask your hostess to claim your Mastercard x McLaren merchandise.</p>
      <button id="endBtn" onclick="goToCeros()">Hostess to validate</button>
    </div>
  </div>
</div>
<script>
  const questions = [
    {
      question: "McLaren Racing operates globally with speed and precision. Which Mastercard capability helps transfer money quickly and securely around the world for people and businesses?",
      answers: ["Consumer Payments","Money Movement","Consumer Acquisition & Engagement","Open Finance"],
      correct: 1
    },
    {
      question: "McLaren Racing fans expect seamless experiences at every touchpoint. Which Mastercard capability gives consumers more choice and flexibility in how they pay?",
      answers: ["Cybersecurity & Fraud Prevention","Commercial Payments","Consumer Payments","Insights & Intelligence"],
      correct: 2
    },
    {
      question: "A McLaren Mastercard F1 Team Car depends on connected systems working together in real time. Which Mastercard capability powers secure payments and data connections between people and businesses?",
      answers: ["Open Finance","Money Movement","Consumer Payments","Consumer Acquisition & Engagement"],
      correct: 0
    },
    {
      question: "High-performance teams need protection from risk and disruption. Which Mastercard capability helps combat fraud and secure digital ecosystems?",
      answers: ["Consumer Acquisition & Engagement","Cybersecurity & Fraud Prevention","Commercial Payments", "Money Movement"],
      correct: 1
    },
    {
      question: "Behind McLaren Racing is a complex global operation that depends on speed and efficiency. Which Mastercard capability helps businesses streamline payments and unlock working capital?",
      answers: ["Insights & Intelligence","Commercial Payments","Money Movement","Consumer Payments"],
      correct: 1
    },
    {
      question: "Modern racing uses intelligent systems that make real-time performance decisions. Which Mastercard capability is helping shape the future of AI-powered commerce?",
      answers: ["Consumer Acquisition & Engagement","Open Finance","AI & Agentic Commerce","Cybersecurity & Fraud Prevention"],
      correct: 2
    }
  ];

 let currentQuestion = 0;
  let score = 0;
  let timer;
  let timeLeft = 20;

  function startQuiz() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }
	
function showQuestion() {
  document.getElementById("progress").textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
  resetTimer();

  const q = questions[currentQuestion];
  document.getElementById("question").textContent = q.question;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  // 🔥 transformation en objets
  let answers = q.answers.map((answer, index) => ({
    text: answer,
    isCorrect: index === q.correct
  }));

  // 🎲 shuffle (version safe)
  for (let i = answers.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [answers[i], answers[j]] = [answers[j], answers[i]];
  }

  // 🔥 création des boutons
  answers.forEach((answerObj) => {
    const btn = document.createElement("button");
    btn.textContent = answerObj.text;

    btn.classList.add("answer");

    // ⚠️ IMPORTANT → string
    btn.dataset.correct = answerObj.isCorrect ? "true" : "false";

    btn.onclick = () => selectAnswer(btn);

    answersDiv.appendChild(btn);
  });
}
	
function selectAnswer(button) {
  if (document.body.classList.contains("locked")) return;
  document.body.classList.add("locked");

  clearInterval(timer);

  const isCorrect = button.dataset.correct === "true";

  if (isCorrect) {
    score++;
    button.classList.add("correct");
  } else {
    button.classList.add("wrong");

    // highlight bonne réponse
    document.querySelectorAll("#answers .answer").forEach(btn => {
      if (btn.dataset.correct === "true") {
        btn.classList.add("correct");
      }
    });
  }

  setTimeout(() => {
    document.body.classList.remove("locked");
    nextQuestion();
  }, 1000);
}
	
  function nextQuestion() {
    clearInterval(timer);
    currentQuestion++;

    if (currentQuestion < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function resetTimer() {
  const radius = 100; // rayon
  const totalTime = 20; // durée totale

  const circle = document.querySelector('.timer-progress');
  const circumference = 2 * Math.PI * radius;

  // Setup du cercle
  circle.style.strokeDasharray = circumference;
  circle.style.strokeDashoffset = circumference;

  function updateCircle() {
    const progress = timeLeft / totalTime;
    const offset = circumference * (1 - progress);
    circle.style.strokeDashoffset = offset;
  }

  window.updateCircle = updateCircle;

  clearInterval(timer);

  timeLeft = totalTime;
  document.getElementById("timer").textContent = timeLeft;

  updateCircle();

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    updateCircle();

    if (timeLeft <= 0) {
      clearInterval(timer); // évite double trigger
      nextQuestion();
    }
  }, 1000);
}

  function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");

    const percentage = Math.round((score / questions.length) * 100);
    document.getElementById("result").textContent = percentage + "%";
  }

  function goToCeros() {
     //window.top.location.href = "https://view.ceros.com/mastercard-europe/test-form/p/4";
	 window.parent.postMessage({ action: "END_QUIZ" }, "*");
  }
</script>
</body>
</html>
