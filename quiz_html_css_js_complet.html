<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #331505;
    }

    .container {
      width: 600px;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }

    .hidden { display: none; }

    button {
      padding: 20px 50px;
      margin: 10px;
      border: none;
      border-radius: 8px;
    background : #ff6a00;
    background: linear-gradient(90deg,#ff671b, #d22a2f 100%);
    color : #ffffff;
      cursor: pointer;
      font-size: 24px;
    }

    button:hover { background: #ff671b; }
	button:checked { 
		  background:#ffffff;
		  color:#000000;
	  }

    .answers button {
      display: block;
      width: 100%;
    }

    #timer {
      font-size: 20px;
      margin-bottom: 20px;
	  color:white;
    }
	  
    .timer-circle {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      position: relative;
    }
	  
	  .timer-circle svg {
      transform: rotate(-90deg);
    }

    .timer-circle circle {
      fill: none;
      stroke-width: 8;
    }

    .timer-bg {
      stroke: #ff671b;
    }

    .timer-progress {
      stroke: #f1efeb;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.2s linear;
    }

    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      font-weight: bold;
    }
	  
    #result {
      font-size: 100px;
      font-weight: bold;
      margin: 20px 0;
	  color:#ff7632;
    }
	  
	  #resultPage{
		  color:white;
	  }
	  
	  #question{
	 color:white;
	  }
	  
	  #progress{
		  font-size:14px; 
		  margin-bottom:50px; 
		  color:#8c8c8c;
	  }
	  
	  #thanksEnd{
		  font-size: 45px;
	  }
	  
	  #endBtn{
	  margin-top: 50px;
      border: none;
      border-radius: 8px;
      background : #141413;
      color : #54524f;
      cursor: pointer;
      font-size: 24px;
	  }
	  
	  #logo-bottom{
		  padding-top: 60px;
	  }
	  
	  #result-bottom-infos{
		border-top: 1px solid #ffffff;
		  margin-top: 50px;
		  padding-top: 25px;
	  }
	  
  </style>
</head>
<body>

<div class="container">

  <!-- INTRO -->
  <div id="intro">
    <!-- <h1>Bienvenue au Quiz</h1>
    <p>Testez vos connaissances !</p> -->
	<img src="ready-title-v3.png" width="100%">
    <button onclick="startQuiz()">I'm ready</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div id="progress"></div>
    <div class="timer-circle">
      <svg width="100" height="100">
        <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
        <circle class="timer-progress" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-text" id="timer">20</div>
    </div>
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
	  <div id="logo-bottom">
	 <img src="Mclaren-MA-logo.png" width="50%">
		</div>
  </div>

  <!-- RESULT -->
  <div id="resultPage" class="hidden">
	<img src="Mclaren-MA-logo.png" width="50%">
    <p id="thanksEnd">Thanks for taking the <b>Mastercard x McLaren Pole Position Challenge</b>.</p>
    <div id="result">
	</div>
	<div id="result-bottom-infos">
	<p>Ask your hostess to claim your Mastercard x McLaren merchandise.</p>
    <button id="endBtn" onclick="goToCeros()">Hostess to validate</button>
	 </div>
  </div>

</div>

<script>
  const questions = [
    {
      question: "McLaren Racing operates globally with speed and precision. Which Mastercard capability helps transfer money quickly and securely around the world for people and businesses?",
      answers: ["Consumer Payments","Money Movement","Consumer Acquisition & Engagement","Open Finance"],
      correct: 1
    },
    {
      question: "McLaren Racing fans expect seamless experiences at every touchpoint. Which Mastercard capability gives consumers more choice and flexibility in how they pay?",
      answers: ["Cybersecurity & Fraud Prevention","Commercial Payments","Consumer Payments","Insights & Intelligence"],
      correct: 2
    },
    {
      question: "A McLaren Mastercard F1 Team Car depends on connected systems working together in real time. Which Mastercard capability powers secure payments and data connections between people and businesses?",
      answers: ["Open Finance","Money Movement","Consumer Payments","Consumer Acquisition & Engagement"],
      correct: 0
    },
    {
      question: "High-performance teams need protection from risk and disruption. Which Mastercard capability helps combat fraud and secure digital ecosystems?",
      answers: ["Consumer Acquisition & Engagement","Cybersecurity & Fraud Prevention","Commercial Payments", "Money Movement"],
      correct: 1
    },
    {
      question: "Behind McLaren Racing is a complex global operation that depends on speed and efficiency. Which Mastercard capability helps businesses streamline payments and unlock working capital?",
      answers: ["Insights & Intelligence","Commercial Payments","Money Movement","Consumer Payments"],
      correct: 1
    },
    {
      question: "Modern racing uses intelligent systems that make real-time performance decisions. Which Mastercard capability is helping shape the future of AI-powered commerce?",
      answers: ["Consumer Acquisition & Engagement","Open Finance","AI & Agentic Commerce","Cybersecurity & Fraud Prevention"],
      correct: 2
    }
  ];

 let currentQuestion = 0;
  let score = 0;
  let timer;
  let timeLeft = 20;

  function startQuiz() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion() {
    // Mise à jour du titre de progression
    document.getElementById("progress").textContent = `Question ${currentQuestion + 1} on ${questions.length}`;
    resetTimer();
    const q = questions[currentQuestion];
    document.getElementById("question").textContent = q.question;
    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((answer, index) => {
      const btn = document.createElement("button");
      btn.textContent = answer;
      btn.onclick = () => selectAnswer(index);
      answersDiv.appendChild(btn);
    });
  }

  function selectAnswer(index) {
    if (index === questions[currentQuestion].correct) {
      score++;
    }
    nextQuestion();
  }

  function nextQuestion() {
    clearInterval(timer);
    currentQuestion++;

    if (currentQuestion < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function resetTimer() {
    const circumference = 2 * Math.PI * 45;
    document.querySelector('.timer-progress').style.strokeDasharray = circumference;

    function updateCircle() {
      const progress = timeLeft / 20;
      document.querySelector('.timer-progress').style.strokeDashoffset = circumference * (1 - progress);
    }

    window.updateCircle = updateCircle;
    clearInterval(timer);
    timeLeft = 20;
    document.getElementById("timer").textContent = timeLeft;
      updateCircle();

    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("timer").textContent = timeLeft;
      updateCircle();

      if (timeLeft <= 0) {
        nextQuestion();
      }
    }, 1000);
  }

  function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");

    const percentage = Math.round((score / questions.length) * 100);
    document.getElementById("result").textContent = percentage + "%";
  }

  function goToCeros() {
    window.location.href = "https://view.ceros.com/mastercard-europe/test-form/p/4"; // à remplacer
  }
</script>

</body>
</html>
